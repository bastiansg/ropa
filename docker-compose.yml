services:
    ropa-core:
        image: ropa-core
        container_name: ropa-core
        build:
            context: .
            dockerfile: ./docker/core/Dockerfile
        env_file:
            - .env
        networks:
            - ropa

    ropa-redis:
        image: redis:8.8.0
        container_name: ropa-redis
        volumes:
            - $PWD/resources/cache/redis:/data
        restart: unless-stopped
        networks:
            - ropa


    ropa-mongo:
        image: mongo:8.2.7
        container_name: ropa-mongo
        ports:
            - "27017:27017"
        command: ["mongod", "--wiredTigerCacheSizeGB", "0.4"]
        volumes:
            - $PWD/resources/db/mongo/db:/data/db:z
        deploy:
            resources:
                limits:
                    memory: 512M
        restart: unless-stopped
        networks:
            - ropa

    ropa-app:
        image: ropa-app
        container_name: ropa-app
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - ropa

networks:
    ropa:
        name: ropa
        driver: bridge
