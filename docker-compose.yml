services:
    ropa-core:
        image: ropa-core
        container_name: ropa-core
        build:
            context: .
            dockerfile: ./docker/core/Dockerfile
        env_file:
            - .env
        networks:
            - ropa

    ropa-redis:
        image: redis:8.8.0
        container_name: ropa-redis
        volumes:
            - $PWD/resources/cache/redis:/data
        restart: unless-stopped
        networks:
            - ropa

    ropa-app:
        image: ropa-app
        container_name: ropa-app
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - ropa

networks:
    ropa:
        name: ropa
        driver: bridge
